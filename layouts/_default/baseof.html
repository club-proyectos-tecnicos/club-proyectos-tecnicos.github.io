<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Site.Params.description }}{{ . }}{{ end }}">
  <link rel="icon" href="{{ with .Site.Params.favicon }}{{ . | relURL }}{{ else }}{{ "/Logo_2.png" | relURL }}{{ end }}">
  <link rel="stylesheet" href="{{ "css/site.css" | relURL }}">  <script>
    (function() {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const savedTheme = localStorage.getItem('theme');
      const theme = savedTheme || (prefersDark ? 'dark' : 'light');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script></head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
        <nav class="site-nav" aria-label="Menú principal">
          <ul>
            {{ range .Site.Menus.main }}
            <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
            {{ end }}
          </ul>
        </nav>
        <button class="theme-toggle" id="theme-toggle" aria-label="Cambiar tema">🌙 Oscuro</button>
      </div>
    </header>
    <main class="site-content">
      {{ block "main" . }}{{ end }}
    </main>
    <footer class="site-footer">
      <div class="container footer-inner">
        <p>{{ .Site.Params.footerText }}</p>
      </div>
    </footer>
  </div>
  <script>
    document.getElementById('theme-toggle').addEventListener('click', function() {
      const html = document.documentElement;
      const btn = this;
      if (html.classList.contains('dark-mode')) {
        html.classList.remove('dark-mode');
        localStorage.setItem('theme', 'light');
        btn.textContent = '🌙 Oscuro';
      } else {
        html.classList.add('dark-mode');
        localStorage.setItem('theme', 'dark');
        btn.textContent = '☀️ Claro';
      }
    });
    // Set button text on load
    if (document.documentElement.classList.contains('dark-mode')) {
      document.getElementById('theme-toggle').textContent = '☀️ Claro';
    }
  </script>
</body>
</html>
