baseURL: "https://javiergonzalvez07-star.github.io/cpta-web/"
canonifyURLs: true
relativeURLs: false
locale: "es-ES"
title: "Club de Proyectos Técnicos Aplicados"

enableRobotsTXT: true

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

pagination:
  pagerSize: 6

markup:
  goldmark:
    renderer:
      unsafe: true

Menus:
  main:
    - identifier: home
      name: Inicio
      title: Inicio
      url: /
      weight: 1
    - identifier: projects
      name: Proyectos
      title: Proyectos
      url: /projects/
      weight: 2
    - identifier: about
      name: Sobre el club
      title: Sobre el club
      url: /about/
      weight: 3
    - identifier: contact
      name: Contacto
      title: Contacto
      url: /contact/
      weight: 4

params:
  title: "Club de Proyectos Técnicos Aplicados"
  description: "Club universitario donde estudiantes de grados técnicos aprenden construyendo proyectos reales, documentan su avance y comparten resultados."
  favicon: "/Logo_2.png"
  footerText: "Club de Proyectos Técnicos Aplicados — Aprendizaje aplicado, proyectos reales y trabajo en equipo."
